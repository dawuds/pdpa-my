<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDPA-MY Explorer</title>
  <meta name="description" content="Interactive browser for Malaysia's Personal Data Protection Act 2010 (Act 709) — explore provisions, principles, penalties, controls, artifacts, and cross-references.">
  <meta property="og:title" content="PDPA Malaysia Compliance Framework">
  <meta property="og:description" content="Malaysia Personal Data Protection Act 2010 compliance reference with 151 provisions, controls, evidence, 60 document templates, and risk management">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header" id="site-header">
    <div class="header-inner">
      <a href="#" class="header-brand">
        <h1>PDPA-MY Explorer</h1>
        <span class="header-subtitle">Personal Data Protection Act 2010 (Act 709)</span>
      </a>
      <div class="header-search">
        <input type="text" id="search-input" placeholder="Search provisions, principles, penalties…" autocomplete="off">
      </div>
    </div>
  </header>
  <nav class="nav" id="site-nav">
    <div class="nav-inner">
      <a href="#" class="nav-link active" data-view="overview">Overview</a>
      <a href="#principles" class="nav-link" data-view="principles">Principles</a>
      <a href="#penalties" class="nav-link" data-view="penalties">Penalties</a>
      <a href="#controls" class="nav-link" data-view="controls">Controls</a>
      <a href="#artifacts" class="nav-link" data-view="artifacts">Artifacts</a>
      <a href="#framework" class="nav-link" data-view="framework">Framework</a>
      <a href="#supplements" class="nav-link" data-view="supplements">Supplements</a>
      <a href="#cross-references" class="nav-link" data-view="cross-references">Cross-Refs</a>
      <a href="#risk-management" class="nav-link" data-view="risk-management">Risk Mgmt</a>
      <a href="#dpia" class="nav-link" data-view="dpia">DPIA</a>
    </div>
  </nav>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <span>Loading PDPA data…</span>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
